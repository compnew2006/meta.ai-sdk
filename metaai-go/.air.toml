# Air — Go hot reload. Rebuilds cmd/metaai-rest and restarts it on any .go
# change. Run with: air  (after `go install github.com/air-verse/air@latest`)
root = "."
testdata_dir = "testdata"
tmp_dir = "tmp"

[build]
  bin = "./tmp/metaai-rest"
  cmd = "go build -o ./tmp/metaai-rest ./cmd/metaai-rest"
  delay = 500                # ms — debounce so a multi-file save rebuilds once
  exclude_dir = ["tmp", "ui", "jenta", "vendor", "testdata", "bin"]
  exclude_regex = ["_test\\.go"]
  include_ext = ["go", "tpl", "tmpl", "html", "env"]
  kill_delay = "0s"
  log = "build-errors.log"
  send_interrupt = true
  stop_on_error = true

[color]
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  time = false

[misc]
  clean_on_exit = true
